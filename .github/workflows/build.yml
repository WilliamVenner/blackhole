name: build

on:
  push:
    tags:
      - "*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build_windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2

      - name: Download WiX Toolset
        run: curl -L -o "wix311.zip" https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip

      - name: Extract WiX Toolset
        run: mkdir wix311 && cd wix311 && tar -xf ..\wix311.zip && cd ..\

      - name: Install cargo wix
        run: cargo install cargo-wix

      - name: Build
        env:
          RUSTFLAGS: -Ctarget-feature=+crt-static
        run: cargo build --verbose --release

      - name: Create installer
        run: cargo wix -v -b "wix311" --no-build --nocapture

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: target/wix/blackhole-*.*.*-x86_64.msi
          fail_on_unmatched_files: true

  build_macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v2

      - name: Install Rust targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install cargo bundle
        run: cargo install cargo-bundle

      - name: Build
        run: cargo build --release --target x86_64-apple-darwin --target aarch64-apple-darwin

      - name: Install ImageMagick
        run: brew install imagemagick

      - name: Generate RGBA PNG icons for bundling
        run: |
          mkdir -p target/macos-icons
          for size in 32 64 128 256 512 1024; do
            magick assets/blackhole.ico -alpha on -resize ${size}x${size} \
              -define png:color-type=6 "PNG32:target/macos-icons/icon-${size}.png"
          done
          ICONS='["target/macos-icons/icon-32.png", "target/macos-icons/icon-64.png", "target/macos-icons/icon-128.png", "target/macos-icons/icon-256.png", "target/macos-icons/icon-512.png", "target/macos-icons/icon-1024.png"]'
          sed -i '' "s|icon = \[\"assets/blackhole.ico\"\]|icon = ${ICONS}|" Cargo.toml

      - name: Bundle
        run: cargo bundle --release --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          APP="target/aarch64-apple-darwin/release/bundle/osx/Blackhole.app"
          BIN_NAME="$(ls "$APP/Contents/MacOS")"
          lipo -create -output "$APP/Contents/MacOS/$BIN_NAME" \
            "target/x86_64-apple-darwin/release/$BIN_NAME" \
            "target/aarch64-apple-darwin/release/$BIN_NAME"
          lipo -info "$APP/Contents/MacOS/$BIN_NAME"
          mv "$APP" Blackhole.app

      - name: ZIP
        run: zip -r Blackhole.app.zip Blackhole.app

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: Blackhole.app.zip
          fail_on_unmatched_files: true
